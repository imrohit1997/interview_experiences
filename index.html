<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit - Curriculum Vitae</title>
    <meta name="description" content="Rohit's Curriculum Vitae">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .cv-container {
            width: 100%;
            max-width: 1000px;
            height: 75vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 1rem;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.6);
        }

        .download-btn svg {
            width: 18px;
            height: 18px;
        }

        .pdf-viewer {
            flex: 1;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .cv-container {
                height: 85vh;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Curriculum Vitae</h1>
        <p>Explore my professional journey and experiences.</p>
    </div>

    <div class="cv-container">
        <div class="toolbar">
            <a href="#" class="download-btn" style="visibility: hidden;">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download PDF
            </a>
        </div>
        <div class="pdf-viewer" style="position: relative;">
            <div id="loading-state" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: white; color: #64748b; font-size: 1.1rem; z-index: 10;">
                Looking for your CV...
            </div>
            <iframe src="" title="Curriculum Vitae" style="opacity: 0; transition: opacity 0.5s ease; position: relative; z-index: 20;">
                This browser does not support PDFs. Please download the PDF to view it.
            </iframe>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const iframe = document.querySelector('iframe');
            const downloadBtn = document.querySelector('.download-btn');
            const loadingState = document.getElementById('loading-state');
            
            async function findPdfUrl() {
                // Method 1: GitHub API (Ideal for GitHub Pages)
                try {
                    let repoOwner = "imrohit1997";
                    let repoName = "interview_experiences";
                    
                    if (window.location.hostname.includes("github.io")) {
                        repoOwner = window.location.hostname.split('.')[0];
                        const pathParts = window.location.pathname.split('/');
                        repoName = pathParts[1] || repoName;
                    }

                    const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/CV`);
                    if (response.ok) {
                        const files = await response.json();
                        const pdfFile = files.find(f => f.name.toLowerCase().endsWith('.pdf'));
                        if (pdfFile) return { url: `CV/${pdfFile.name}`, name: pdfFile.name };
                    }
                } catch (e) {
                    console.log("GitHub API method skipped or failed.", e);
                }

                // Method 2: Local Directory Listing (Works on local dev servers)
                try {
                    const response = await fetch('CV/');
                    if (response.ok) {
                        const html = await response.text();
                        const match = html.match(/href=["']?([^"'>]+\.pdf)["']?/i);
                        if (match) {
                            const fileName = match[1].split('/').pop();
                            return { url: `CV/${fileName}`, name: decodeURIComponent(fileName) };
                        }
                    }
                } catch (e) {
                    console.log("Local directory index method skipped.", e);
                }

                return null;
            }

            const pdfInfo = await findPdfUrl();
            
            if (pdfInfo) {
                iframe.src = pdfInfo.url;
                downloadBtn.href = pdfInfo.url;
                downloadBtn.download = pdfInfo.name;
                
                // Show iframe and download button once loaded
                iframe.onload = () => {
                    loadingState.style.display = 'none';
                    iframe.style.opacity = '1';
                };
                downloadBtn.style.visibility = 'visible';
            } else {
                loadingState.innerHTML = `<span style="color: #ef4444; padding: 1rem; text-align: center;">Could not find the PDF file in the CV folder.<br><small style="color: #64748b; margin-top: 0.5rem; display: block;">Note: Browser security prevents dynamic file loading when opened directly from a local folder (file://). Please use a local web server or push to GitHub.</small></span>`;
            }
        });
    </script>
</body>
</html>
